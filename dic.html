<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocabulary</title>

<style>
body {
    background: #222;
    color: #ddd;
    font-family: sans-serif;
    margin: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.header h2 {
    margin: 0;
    font-weight: normal;
}

#sortMode {
    background: #333;
    color: #ddd;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 4px 8px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th,
td {
    padding: 4px 8px;
    border-bottom: 1px solid #444;
}

th {
    text-align: left;
    font-weight: normal;
    color: #aaa;
}

.handle {
    width: 24px;
    color: #888;
    cursor: move;
    user-select: none;
}

.hidden {
    visibility: hidden;
}

.actions {
    width: 70px;
    white-space: nowrap;
}

.actions button {
    background: none;
    border: none;
    color: #ddd;
    cursor: pointer;
    font-size: 16px;
    padding: 0 2px;
}

.actions button:hover {
    color: white;
}

.column-toggle {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 0;
}

.column-toggle:hover {
    color: #fff;
}

.cell-placeholder {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 0;
}

.cell-placeholder:hover {
    color: #fff;
}

input {
    width: 100%;
    box-sizing: border-box;
    background: #2b2b2b;
    color: #ddd;
    border: 1px solid #555;
    padding: 4px 6px;
}

tr.dragging {
    opacity: 0.4;
}

tr.manageable td {
    background: #282828;
}

tr.editing td {
    background: #2c2c2c;
}
</style>
</head>

<body>

<div class="header">
    <h2>Vocabulary</h2>

    <select id="sortMode">
        <option value="original">
            Original order
        </option>

        <option value="reverse">
            Reverse order
        </option>

        <option value="alphabetic">
            Alphabetic
        </option>

        <option value="random">
            Random
        </option>
    </select>
</div>

<table>
    <thead>
    <tr>
        <th></th>
        <th>
            Word
            <button
                class="column-toggle"
                data-toggle-column="word"
                title="Toggle word column">
                [?]
            </button>
        </th>
        <th>
            Translation
            <button
                class="column-toggle"
                data-toggle-column="translation"
                title="Toggle translation column">
                [?]
            </button>
        </th>
        <th></th>
    </tr>
    </thead>

    <tbody id="tbody">
    </tbody>
</table>

<script>
// Central application state: sorting, row modes, and column visibility live here.
const state = {
    sortMode: 'original',
    rowMode: 'view',
    activeRowId: null,
    hiddenColumns: {
        word: false,
        translation: false
    },
    revealedCells: {
        word: {},
        translation: {}
    }
};

let words = [];

load();
render();

document.getElementById('sortMode').onchange = e => {
    state.sortMode = e.target.value;
    state.rowMode = 'view';
    state.activeRowId = null;
    render();
};

function load() {
    words = JSON.parse(
        localStorage.getItem('words') ?? '[]'
    );
}

function save() {
    localStorage.setItem(
        'words',
        JSON.stringify(words)
    );
}

function addWord() {
    const wordInput =
        document.getElementById('newWord');

    const translationInput =
        document.getElementById('newTranslation');

    const word =
        wordInput.value.trim();

    const translation =
        translationInput.value.trim();

    if (!word) {
        wordInput.focus();
        return;
    }

    words.push({
        id: crypto.randomUUID(),
        word,
        translation
    });

    save();

    wordInput.value = '';
    translationInput.value = '';

    render();
    wordInput.focus();
}

function setRowMode(mode, rowId = null) {
    state.rowMode = mode;
    state.activeRowId = rowId;
}

function toggleColumn(column) {
    state.hiddenColumns[column] =
        !state.hiddenColumns[column];

    if (!state.hiddenColumns[column]) {
        state.revealedCells[column] = {};
    }

    render();
}

function revealCell(column, rowId) {
    state.revealedCells[column][rowId] = true;
    render();
}

function isCellRevealed(column, rowId) {
    return Boolean(
        state.revealedCells[column][rowId]
    );
}

function editWord(id) {
    setRowMode('edit', id);
    render();
}

function saveEdit(id) {
    const item =
        words.find(x => x.id === id);

    if (!item) {
        return;
    }

    const row =
        document.querySelector(
            `tr[data-id="${id}"]`
        );

    if (!row) {
        return;
    }

    const wordInput =
        row.querySelector(
            '[data-field="word"]'
        );

    const translationInput =
        row.querySelector(
            '[data-field="translation"]'
        );

    const word =
        wordInput.value.trim();

    if (!word) {
        wordInput.focus();
        return;
    }

    item.word = word;
    item.translation =
        translationInput.value.trim();

    setRowMode('view');
    save();
    render();
}

function cancelEdit() {
    setRowMode('view');
    render();
}

function removeWord(id) {
    words =
        words.filter(x => x.id !== id);

    delete state.revealedCells.word[id];
    delete state.revealedCells.translation[id];

    if (state.activeRowId === id) {
        setRowMode('view');
    }

    save();
    render();
}

function getDisplayedWords() {
    switch (state.sortMode) {

        case 'reverse':
            return [...words].reverse();

        case 'alphabetic':
            return [...words].sort(
                (a, b) =>
                    a.word.localeCompare(
                        b.word
                    )
            );

        case 'random':
            return shuffle([...words]);

        default:
            return words;
    }
}

function shuffle(arr) {
    const copy = [...arr];

    for (
        let i = copy.length - 1;
        i > 0;
        i--
    ) {
        const j = Math.floor(
            Math.random() * (i + 1)
        );

        [copy[i], copy[j]] =
            [copy[j], copy[i]];
    }

    return copy;
}

function render() {
    const tbody =
        document.getElementById(
            'tbody'
        );

    tbody.innerHTML = '';

    const displayed =
        getDisplayedWords();

    const allowDrag =
        state.sortMode === 'original' &&
        state.rowMode !== 'edit';

    displayed.forEach(item => {
        const tr =
            document.createElement('tr');

        tr.dataset.id = item.id;
        tr.classList.toggle(
            'manageable',
            state.rowMode === 'manageable' &&
            state.activeRowId === item.id
        );
        tr.classList.toggle(
            'editing',
            state.rowMode === 'edit' &&
            state.activeRowId === item.id
        );

        if (
            state.rowMode === 'edit' &&
            state.activeRowId === item.id
        ) {
            tr.innerHTML = `
                <td
                    class="handle hidden"
                    draggable="false">
                    ☰
                </td>

                <td>
                    <input
                        data-field="word"
                        value="${escapeAttr(item.word)}">
                </td>

                <td>
                    <input
                        data-field="translation"
                        value="${escapeAttr(item.translation)}">
                </td>

                <td class="actions">
                    <button
                        data-save="${item.id}"
                        title="Save">
                        💾
                    </button>

                    <button
                        data-cancel
                        title="Cancel">
                        ✕
                    </button>
                </td>
            `;
        } else {
            tr.innerHTML = `
                <td
                    class="handle ${allowDrag ? '' : 'hidden'}"
                    draggable="${allowDrag}">
                    ☰
                </td>

                <td>
                    ${
                        state.hiddenColumns.word
                            && !isCellRevealed(
                                'word',
                                item.id
                            )
                            ? `<button class="cell-placeholder" data-reveal-cell="word" data-row-id="${item.id}">[????]</button>`
                            : escapeHtml(item.word)
                    }
                </td>

                <td>
                    ${
                        state.hiddenColumns.translation
                            && !isCellRevealed(
                                'translation',
                                item.id
                            )
                            ? `<button class="cell-placeholder" data-reveal-cell="translation" data-row-id="${item.id}">[????]</button>`
                            : escapeHtml(item.translation)
                    }
                </td>

                <td class="actions ${
                    state.rowMode === 'manageable' &&
                    state.activeRowId === item.id
                        ? ''
                        : 'hidden'
                }">
                    <button
                        data-edit="${item.id}"
                        title="Edit">✏</button>
                    <button
                        data-delete="${item.id}"
                        title="Delete">🗑</button>
                </td>
            `;
        }

        tbody.appendChild(tr);
    });

    appendAddRow();
    bindButtons();

    if (allowDrag) {
        bindDnD();
    }
}

function appendAddRow() {
    const tbody =
        document.getElementById(
            'tbody'
        );

    const tr =
        document.createElement('tr');

    tr.innerHTML = `
        <td>＋</td>

        <td>
            <input
                id="newWord"
                placeholder="word">
        </td>

        <td>
            <input
                id="newTranslation"
                placeholder="translation">
        </td>

        <td class="actions">
            <button
                id="addBtn"
                title="Add">
                ➕
            </button>
        </td>
    `;

    tbody.appendChild(tr);

    document.getElementById(
        'addBtn'
    ).onclick = addWord;

    const onEnter = e => {
        if (e.key === 'Enter') {
            addWord();
        }
    };

    document
        .getElementById('newWord')
        .addEventListener(
            'keydown',
            onEnter
        );

    document
        .getElementById(
            'newTranslation'
        )
        .addEventListener(
            'keydown',
            onEnter
        );
}

function bindButtons() {
    document
        .querySelector(
            'tbody'
        ).onclick = e => {
            const row =
                e.target.closest(
                    'tr[data-id]'
                );
            const interactive =
                e.target.closest(
                    'button, input, .handle'
                );

            if (
                !row ||
                interactive
            ) {
                return;
            }

            if (state.rowMode === 'edit') {
                return;
            }

            if (
                state.rowMode === 'manageable' &&
                state.activeRowId === row.dataset.id
            ) {
                setRowMode('view');
            } else {
                setRowMode(
                    'manageable',
                    row.dataset.id
                );
            }
            render();
        };

    document.body.onclick = e => {
        if (
            e.target.closest('tr[data-id]') ||
            e.target.closest('#sortMode') ||
            e.target.closest('#addBtn') ||
            e.target.closest('#newWord') ||
            e.target.closest('#newTranslation')
        ) {
            return;
        }

        if (
            state.rowMode === 'manageable'
        ) {
            setRowMode('view');
            render();
        }
    };

    document
        .querySelectorAll(
            '[data-toggle-column]'
        )
        .forEach(btn => {
            btn.onclick =
                () =>
                    toggleColumn(
                        btn.dataset.toggleColumn
                    );
        });

    document
        .querySelectorAll(
            '[data-reveal-cell]'
        )
        .forEach(btn => {
            btn.onclick =
                () => {
                    revealCell(
                        btn.dataset.revealCell,
                        btn.dataset.rowId
                    );
                };
        });

    document
        .querySelectorAll(
            '[data-edit]'
        )
        .forEach(btn => {
            btn.onclick =
                () =>
                    editWord(
                        btn.dataset.edit
                    );
        });

    document
        .querySelectorAll(
            '[data-save]'
        )
        .forEach(btn => {
            btn.onclick =
                () =>
                    saveEdit(
                        btn.dataset.save
                    );
        });

    document
        .querySelectorAll(
            '[data-cancel]'
        )
        .forEach(btn => {
            btn.onclick =
                cancelEdit;
        });

    document
        .querySelectorAll(
            '[data-delete]'
        )
        .forEach(btn => {
            btn.onclick =
                () =>
                    removeWord(
                        btn.dataset.delete
                    );
        });

    document
        .querySelectorAll(
            'tr[data-id] input'
        )
        .forEach(input => {
            input.addEventListener(
                'keydown',
                e => {
                    if (
                        e.key === 'Enter'
                    ) {
                        saveEdit(
                            input
                                .closest(
                                    'tr'
                                )
                                .dataset.id
                        );
                    }

                    if (
                        e.key === 'Escape'
                    ) {
                        cancelEdit();
                    }
                }
            );
        });
}

function bindDnD() {
    let dragged = null;

    document
        .querySelectorAll(
            'tbody tr[data-id] .handle'
        )
        .forEach(handle => {

            handle.addEventListener(
                'dragstart',
                () => {
                    dragged =
                        handle.closest('tr');
                    dragged.classList.add(
                        'dragging'
                    );
                }
            );

            handle.addEventListener(
                'dragend',
                () => {
                    if (dragged) {
                        dragged.classList.remove(
                            'dragging'
                        );
                    }
                    dragged = null;
                }
            );
        });

    document
        .querySelectorAll(
            'tbody tr[data-id]'
        )
        .forEach(row => {

            row.addEventListener(
                'dragover',
                e => {
                    e.preventDefault();
                }
            );

            row.addEventListener(
                'drop',
                e => {
                    e.preventDefault();

                    if (
                        !dragged ||
                        dragged === row
                    ) {
                        return;
                    }

                    const fromId =
                        dragged.dataset.id;

                    const toId =
                        row.dataset.id;

                    const from =
                        words.findIndex(
                            x =>
                                x.id ===
                                fromId
                        );

                    const to =
                        words.findIndex(
                            x =>
                                x.id ===
                                toId
                        );

                    const [item] =
                        words.splice(
                            from,
                            1
                        );

                    words.splice(
                        to,
                        0,
                        item
                    );

                    save();
                    render();
                }
            );
        });
}

function escapeHtml(text) {
    return text
        .replaceAll(
            '&',
            '&amp;'
        )
        .replaceAll(
            '<',
            '&lt;'
        )
        .replaceAll(
            '>',
            '&gt;'
        );
}

function escapeAttr(text) {
    return escapeHtml(text)
        .replaceAll(
            '"',
            '&quot;'
        )
        .replaceAll(
            "'",
            '&#39;'
        );
}
</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocabulary</title>

<style>
body {
    background: #222;
    color: #ddd;
    font-family: sans-serif;
    margin: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.header h2 {
    margin: 0;
    font-weight: normal;
}

#sortMode {
    background: #333;
    color: #ddd;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 4px 8px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th,
td {
    padding: 4px 8px;
    border-bottom: 1px solid #444;
}

th {
    text-align: left;
    font-weight: normal;
    color: #aaa;
}

.handle {
    width: 24px;
    color: #888;
    cursor: move;
    user-select: none;
}

.hidden {
    visibility: hidden;
}

.actions {
    width: 70px;
    white-space: nowrap;
}

.actions button {
    background: none;
    border: none;
    color: #ddd;
    cursor: pointer;
    font-size: 16px;
    padding: 0 2px;
}

.actions button:hover {
    color: white;
}

.column-toggle {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 0;
}

.column-toggle:hover {
    color: #fff;
}

.cell-placeholder {
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    padding: 0;
}

.cell-placeholder:hover {
    color: #fff;
}

input {
    width: 100%;
    box-sizing: border-box;
    background: #2b2b2b;
    color: #ddd;
    border: 1px solid #555;
    padding: 4px 6px;
}

tr.dragging {
    opacity: 0.4;
}

tr.manageable td {
    background: #282828;
}

tr.editing td {
    background: #2c2c2c;
}

.storage-info {
    margin-top: 14px;
    color: #9a9a9a;
    font-size: 12px;
}

.workspace {
    display: flex;
    gap: 18px;
    align-items: flex-start;
}

.panel {
    min-width: 0;
}

.lessons-panel {
    flex: 0 0 290px;
}

.vocabulary-panel {
    flex: 1;
}

.panel h2 {
    margin: 0;
    font-weight: normal;
}

.panel-title {
    margin-bottom: 12px;
}

tr.selected:not(.manageable):not(.editing) td {
    background: #262626;
}
</style>
</head>

<body>

<div class="workspace">
    <section class="panel lessons-panel">
        <div class="panel-title">
            <h2>Lessons</h2>
        </div>

        <table>
            <thead>
            <tr>
                <th></th>
                <th>Lesson</th>
                <th></th>
            </tr>
            </thead>

            <tbody id="lessonsTbody"></tbody>
        </table>
    </section>

    <section class="panel vocabulary-panel">
        <div class="header">
            <h2 id="vocabularyTitle">Vocabulary</h2>

            <select id="sortMode">
                <option value="original">
                    Original order
                </option>

                <option value="reverse">
                    Reverse order
                </option>

                <option value="alphabetic">
                    Alphabetic
                </option>

                <option value="random">
                    Random
                </option>
            </select>
        </div>

        <table>
            <thead>
            <tr>
                <th></th>
                <th>
                    Word
                    <button
                        class="column-toggle"
                        data-toggle-column="word"
                        title="Toggle word column">
                        [?]
                    </button>
                </th>
                <th>
                    Translation
                    <button
                        class="column-toggle"
                        data-toggle-column="translation"
                        title="Toggle translation column">
                        [?]
                    </button>
                </th>
                <th></th>
            </tr>
            </thead>

            <tbody id="vocabTbody"></tbody>
        </table>
    </section>
</div>

<div id="storageInfo" class="storage-info">
    storage used ...
</div>

<script>
// Central application state: lesson selection, row modes, sort mode, and column visibility live here.
const state = {
    sortMode: 'original',
    lessonMode: 'view',
    activeLessonId: null,
    vocabMode: 'view',
    activeWordId: null,
    hiddenColumns: {
        word: false,
        translation: false
    },
    revealedCells: {
        word: {},
        translation: {}
    }
};

let lessons = [];

const lessonsTbody =
    document.getElementById(
        'lessonsTbody'
    );

const vocabTbody =
    document.getElementById(
        'vocabTbody'
    );

const vocabularyTitle =
    document.getElementById(
        'vocabularyTitle'
    );

const rowModeFields = {
    lesson: {
        mode: 'lessonMode',
        activeId: 'activeLessonId'
    },
    vocab: {
        mode: 'vocabMode',
        activeId: 'activeWordId'
    }
};

load();
ensureActiveLesson();
renderAll();

document.getElementById('sortMode').onchange = e => {
    state.sortMode = e.target.value;
    setRowMode('vocab', 'view');
    renderVocabulary();
};

lessonsTbody.addEventListener(
    'click',
    handleLessonsClick
);

vocabTbody.addEventListener(
    'click',
    handleVocabularyClick
);

document.body.addEventListener(
    'click',
    handleOutsideClick
);

document
    .querySelectorAll(
        '[data-toggle-column]'
    )
    .forEach(btn => {
        btn.addEventListener(
            'click',
            () => {
                toggleColumn(
                    btn.dataset.toggleColumn
                );
            }
        );
    });

function load() {
    const storedLessons = JSON.parse(
        localStorage.getItem('lessons') ?? 'null'
    );

    if (
        Array.isArray(storedLessons) &&
        storedLessons.length
    ) {
        lessons = storedLessons.map(
            normalizeLesson
        );
        return;
    }

    lessons = [createLesson(defaultLessonTitle(1))];
}

function save() {
    localStorage.setItem(
        'lessons',
        JSON.stringify(lessons)
    );

    updateStorageInfo();
}

function renderAll() {
    ensureActiveLesson();
    renderLessons();
    renderVocabulary();
    updateStorageInfo();
}

function updateStorageInfo() {
    const storageInfo =
        document.getElementById('storageInfo');

    const quotaBytes = 5 * 1024 * 1024;
    const usedBytes = getLocalStorageBytes();

    storageInfo.textContent =
        `storage used ${formatBytes(usedBytes)} from ${formatBytes(quotaBytes)}`;
}

function getLocalStorageBytes() {
    const parts = [];

    for (let index = 0; index < localStorage.length; index++) {
        const key = localStorage.key(index);
        const value = localStorage.getItem(key) ?? '';

        parts.push(`${key}:${value}`);
    }

    return new Blob(parts).size;
}

function formatBytes(bytes) {
    if (bytes < 1024 * 1024) {
        return `${Math.round(bytes / 1024)}K`;
    }

    return `${(bytes / (1024 * 1024)).toFixed(1)}M`;
}

function createLesson(title, words = []) {
    return {
        id: crypto.randomUUID(),
        title,
        words
    };
}

function defaultLessonTitle(number) {
    return `L${number}.`;
}

function normalizeWord(item) {
    return {
        id: item?.id ?? crypto.randomUUID(),
        word: String(item?.word ?? '').trim(),
        translation: String(
            item?.translation ??
            item?.transtalion ??
            ''
        ).trim()
    };
}

function normalizeLesson(item, index) {
    return {
        id: item?.id ?? crypto.randomUUID(),
        title:
            String(item?.title ?? '').trim() ||
            defaultLessonTitle(index + 1),
        words: Array.isArray(item?.words)
            ? item.words.map(normalizeWord)
            : []
    };
}

function ensureActiveLesson() {
    if (!lessons.length) {
        lessons.push(
            createLesson(defaultLessonTitle(1))
        );
    }

    if (!getLessonById(state.activeLessonId)) {
        state.activeLessonId = lessons[0].id;
    }
}

function getLessonById(id) {
    return lessons.find(lesson => lesson.id === id) ?? null;
}

function getActiveLesson() {
    return (
        getLessonById(state.activeLessonId) ??
        lessons[0] ??
        null
    );
}

function setActiveLesson(id) {
    state.activeLessonId = id;
    setRowMode('vocab', 'view', null);
}

function setRowMode(scope, mode, rowId = null) {
    const fields = rowModeFields[scope];

    state[fields.mode] = mode;

    if (arguments.length >= 3) {
        state[fields.activeId] = rowId;
    }
}

function confirmDelete(kind, name) {
    return confirm(`Delete ${kind} "${name}"?`);
}

function getRowMode(scope) {
    const fields = rowModeFields[scope];

    return {
        mode: state[fields.mode],
        activeId: state[fields.activeId]
    };
}

function isRowMode(scope, rowId, mode) {
    const current = getRowMode(scope);

    return (
        current.mode === mode &&
        current.activeId === rowId
    );
}

function toggleManageableRow(scope, rowId) {
    if (isRowMode(scope, rowId, 'manageable')) {
        setRowMode(scope, 'view');
        return;
    }

    setRowMode(scope, 'manageable', rowId);
}

function toggleColumn(column) {
    state.hiddenColumns[column] =
        !state.hiddenColumns[column];

    if (!state.hiddenColumns[column]) {
        state.revealedCells[column] = {};
    }

    renderVocabulary();
}

function revealCell(column, rowId) {
    state.revealedCells[column][rowId] = true;
    renderVocabulary();
}

function isCellRevealed(column, rowId) {
    return Boolean(
        state.revealedCells[column][rowId]
    );
}

function addLesson() {
    const titleInput =
        document.getElementById(
            'newLessonTitle'
        );

    const title =
        titleInput.value.trim() ||
        defaultLessonTitle(lessons.length + 1);

    const lesson =
        createLesson(title);

    lessons.push(lesson);
    save();

    titleInput.value = '';
    setActiveLesson(lesson.id);
    setRowMode('lesson', 'view');

    renderAll();
}

function editLesson(id) {
    setActiveLesson(id);
    setRowMode('lesson', 'edit', id);
    renderAll();
}

function saveLessonEdit(id) {
    const lesson =
        getLessonById(id);

    if (!lesson) {
        return;
    }

    const row =
        lessonsTbody.querySelector(
            `tr[data-id="${id}"]`
        );

    if (!row) {
        return;
    }

    const titleInput =
        row.querySelector(
            '[data-field="title"]'
        );

    const title =
        titleInput.value.trim() ||
        defaultLessonTitle(
            lessons.findIndex(
                item => item.id === id
            ) + 1
        );

    lesson.title = title;

    setRowMode('lesson', 'view');
    save();
    renderAll();
}

function cancelLessonEdit() {
    setRowMode('lesson', 'view');
    renderAll();
}

function removeLesson(id) {
    const index =
        lessons.findIndex(
            lesson => lesson.id === id
        );

    if (index < 0) {
        return;
    }

    const lesson = lessons[index];

    if (!confirmDelete('lesson', lesson.title)) {
        return;
    }

    const [removed] =
        lessons.splice(index, 1);

    cleanupCellStateForLesson(removed);

    if (!lessons.length) {
        lessons.push(
            createLesson(defaultLessonTitle(1))
        );
    }

    const nextLesson =
        lessons[
            Math.min(index, lessons.length - 1)
        ];

    setActiveLesson(nextLesson.id);
    setRowMode('lesson', 'view');
    setRowMode('vocab', 'view', null);

    save();
    renderAll();
}

function cleanupCellStateForLesson(lesson) {
    lesson.words.forEach(word => {
        delete state.revealedCells.word[word.id];
        delete state.revealedCells.translation[word.id];
    });
}

function addWord() {
    const lesson = getActiveLesson();

    if (!lesson) {
        return;
    }

    const wordInput =
        document.getElementById('newWord');

    const translationInput =
        document.getElementById('newTranslation');

    const word =
        wordInput.value.trim();

    const translation =
        translationInput.value.trim();

    if (!word) {
        wordInput.focus();
        return;
    }

    lesson.words.push({
        id: crypto.randomUUID(),
        word,
        translation
    });

    save();

    wordInput.value = '';
    translationInput.value = '';

    renderVocabulary();
    wordInput.focus();
}

function editWord(id) {
    setRowMode('vocab', 'edit', id);
    renderVocabulary();
}

function saveWordEdit(id) {
    const lesson = getActiveLesson();

    if (!lesson) {
        return;
    }

    const item =
        lesson.words.find(
            word => word.id === id
        );

    if (!item) {
        return;
    }

    const row =
        vocabTbody.querySelector(
            `tr[data-id="${id}"]`
        );

    if (!row) {
        return;
    }

    const wordInput =
        row.querySelector(
            '[data-field="word"]'
        );

    const translationInput =
        row.querySelector(
            '[data-field="translation"]'
        );

    const word =
        wordInput.value.trim();

    if (!word) {
        wordInput.focus();
        return;
    }

    item.word = word;
    item.translation =
        translationInput.value.trim();

    setRowMode('vocab', 'view');
    save();
    renderVocabulary();
}

function cancelWordEdit() {
    setRowMode('vocab', 'view');
    renderVocabulary();
}

function removeWord(id) {
    const lesson = getActiveLesson();

    if (!lesson) {
        return;
    }

    const removed =
        lesson.words.find(
            word => word.id === id
        );

    if (!removed) {
        return;
    }

    if (!confirmDelete('word', removed.word)) {
        return;
    }

    lesson.words =
        lesson.words.filter(
            word => word.id !== id
        );

    delete state.revealedCells.word[id];
    delete state.revealedCells.translation[id];

    if (state.activeWordId === id) {
        setRowMode('vocab', 'view', null);
    }

    save();
    renderVocabulary();
}

function getDisplayedWords() {
    const lesson = getActiveLesson();

    if (!lesson) {
        return [];
    }

    switch (state.sortMode) {

        case 'reverse':
            return [...lesson.words].reverse();

        case 'alphabetic':
            return [...lesson.words].sort(
                (a, b) =>
                    a.word.localeCompare(
                        b.word
                    )
            );

        case 'random':
            return shuffle([...lesson.words]);

        default:
            return lesson.words;
    }
}

function shuffle(arr) {
    const copy = [...arr];

    for (
        let i = copy.length - 1;
        i > 0;
        i--
    ) {
        const j = Math.floor(
            Math.random() * (i + 1)
        );

        [copy[i], copy[j]] =
            [copy[j], copy[i]];
    }

    return copy;
}

function renderLessons() {
    lessonsTbody.innerHTML = '';

    lessons.forEach(lesson => {
        const tr =
            document.createElement('tr');

        tr.dataset.id = lesson.id;
        tr.classList.toggle(
            'selected',
            lesson.id === state.activeLessonId
        );
        tr.classList.toggle(
            'manageable',
            isRowMode(
                'lesson',
                lesson.id,
                'manageable'
            )
        );
        tr.classList.toggle(
            'editing',
            isRowMode('lesson', lesson.id, 'edit')
        );

        if (
            isRowMode('lesson', lesson.id, 'edit')
        ) {
            tr.innerHTML = `
                <td
                    class="handle hidden"
                    draggable="false">
                    ☰
                </td>

                <td>
                    <input
                        data-field="title"
                        value="${escapeAttr(lesson.title)}">
                </td>

                <td class="actions">
                    <button
                        data-save-lesson="${lesson.id}"
                        title="Save">
                        💾
                    </button>

                    <button
                        data-cancel-lesson
                        title="Cancel">
                        ✕
                    </button>
                </td>
            `;
        } else {
            tr.innerHTML = `
                <td
                    class="handle"
                    draggable="true">
                    ☰
                </td>

                <td>
                    ${escapeHtml(lesson.title)}
                </td>

                <td class="actions ${
                    isRowMode(
                        'lesson',
                        lesson.id,
                        'manageable'
                    )
                        ? ''
                        : 'hidden'
                }">
                    <button
                        data-edit-lesson="${lesson.id}"
                        title="Edit">
                        ✏
                    </button>

                    <button
                        data-delete-lesson="${lesson.id}"
                        title="Delete">
                        🗑
                    </button>
                </td>
            `;
        }

        lessonsTbody.appendChild(tr);
    });

    appendAddLessonRow();
    bindLessonDnD();
}

function renderVocabulary() {
    const lesson = getActiveLesson();

    vocabularyTitle.textContent = lesson
        ? `Vocabulary — ${lesson.title}`
        : 'Vocabulary';

    vocabTbody.innerHTML = '';

    const displayed = getDisplayedWords();

    const allowDrag =
        state.sortMode === 'original' &&
        state.vocabMode !== 'edit';

    displayed.forEach(item => {
        const tr =
            document.createElement('tr');

        tr.dataset.id = item.id;
        tr.classList.toggle(
            'selected',
            state.activeWordId === item.id
        );
        tr.classList.toggle(
            'manageable',
            isRowMode(
                'vocab',
                item.id,
                'manageable'
            )
        );
        tr.classList.toggle(
            'editing',
            isRowMode('vocab', item.id, 'edit')
        );

        if (
            isRowMode('vocab', item.id, 'edit')
        ) {
            tr.innerHTML = `
                <td
                    class="handle hidden"
                    draggable="false">
                    ☰
                </td>

                <td>
                    <input
                        data-field="word"
                        value="${escapeAttr(item.word)}">
                </td>

                <td>
                    <input
                        data-field="translation"
                        value="${escapeAttr(item.translation)}">
                </td>

                <td class="actions">
                    <button
                        data-save-word="${item.id}"
                        title="Save">
                        💾
                    </button>

                    <button
                        data-cancel-word
                        title="Cancel">
                        ✕
                    </button>
                </td>
            `;
        } else {
            tr.innerHTML = `
                <td
                    class="handle ${allowDrag ? '' : 'hidden'}"
                    draggable="${allowDrag}">
                    ☰
                </td>

                <td>
                    ${
                        state.hiddenColumns.word &&
                        !isCellRevealed(
                            'word',
                            item.id
                        )
                            ? `<button class="cell-placeholder" data-reveal-cell="word" data-row-id="${item.id}">[????]</button>`
                            : escapeHtml(item.word)
                    }
                </td>

                <td>
                    ${
                        state.hiddenColumns.translation &&
                        !isCellRevealed(
                            'translation',
                            item.id
                        )
                            ? `<button class="cell-placeholder" data-reveal-cell="translation" data-row-id="${item.id}">[????]</button>`
                            : escapeHtml(item.translation)
                    }
                </td>

                <td class="actions ${
                    isRowMode(
                        'vocab',
                        item.id,
                        'manageable'
                    )
                        ? ''
                        : 'hidden'
                }">
                    <button
                        data-edit-word="${item.id}"
                        title="Edit">✏</button>
                    <button
                        data-delete-word="${item.id}"
                        title="Delete">🗑</button>
                </td>
            `;
        }

        vocabTbody.appendChild(tr);
    });

    appendAddWordRow();
    bindVocabularyDnD();
}

function appendAddLessonRow() {
    const tr =
        document.createElement('tr');

    tr.innerHTML = `
        <td>＋</td>

        <td>
            <input
                id="newLessonTitle"
                placeholder="lesson title">
        </td>

        <td class="actions">
            <button
                id="addLessonBtn"
                title="Add">
                ➕
            </button>
        </td>
    `;

    lessonsTbody.appendChild(tr);

    document.getElementById(
        'addLessonBtn'
    ).onclick = addLesson;

    document
        .getElementById('newLessonTitle')
        .addEventListener(
            'keydown',
            e => {
                if (e.key === 'Enter') {
                    addLesson();
                }
            }
        );
}

function appendAddWordRow() {
    const tr =
        document.createElement('tr');

    tr.innerHTML = `
        <td>＋</td>

        <td>
            <input
                id="newWord"
                placeholder="word">
        </td>

        <td>
            <input
                id="newTranslation"
                placeholder="translation">
        </td>

        <td class="actions">
            <button
                id="addWordBtn"
                title="Add">
                ➕
            </button>
        </td>
    `;

    vocabTbody.appendChild(tr);

    document.getElementById(
        'addWordBtn'
    ).onclick = addWord;

    const onEnter = e => {
        if (e.key === 'Enter') {
            addWord();
        }
    };

    document
        .getElementById('newWord')
        .addEventListener(
            'keydown',
            onEnter
        );

    document
        .getElementById('newTranslation')
        .addEventListener(
            'keydown',
            onEnter
        );
}

function handleLessonsClick(e) {
    const button =
        e.target.closest('button');

    if (button) {
        if (button.dataset.editLesson) {
            editLesson(
                button.dataset.editLesson
            );
            return;
        }

        if (button.dataset.saveLesson) {
            saveLessonEdit(
                button.dataset.saveLesson
            );
            return;
        }

        if (button.dataset.cancelLesson !== undefined) {
            cancelLessonEdit();
            return;
        }

        if (button.dataset.deleteLesson) {
            removeLesson(
                button.dataset.deleteLesson
            );
            return;
        }

        if (button.id === 'addLessonBtn') {
            addLesson();
            return;
        }
    }

    const row =
        e.target.closest('tr[data-id]');

    if (
        !row ||
        e.target.closest('input, .handle')
    ) {
        return;
    }

    if (state.lessonMode === 'edit') {
        return;
    }

    setActiveLesson(row.dataset.id);
    toggleManageableRow('lesson', row.dataset.id);

    e.stopPropagation();
    renderAll();
}

function handleVocabularyClick(e) {
    const button =
        e.target.closest('button');

    if (button) {
        if (button.dataset.toggleColumn) {
            toggleColumn(
                button.dataset.toggleColumn
            );
            return;
        }

        if (button.dataset.revealCell) {
            revealCell(
                button.dataset.revealCell,
                button.dataset.rowId
            );
            return;
        }

        if (button.dataset.editWord) {
            editWord(
                button.dataset.editWord
            );
            return;
        }

        if (button.dataset.saveWord) {
            saveWordEdit(
                button.dataset.saveWord
            );
            return;
        }

        if (button.dataset.cancelWord !== undefined) {
            cancelWordEdit();
            return;
        }

        if (button.dataset.deleteWord) {
            removeWord(
                button.dataset.deleteWord
            );
            return;
        }

        if (button.id === 'addWordBtn') {
            addWord();
            return;
        }
    }

    const row =
        e.target.closest('tr[data-id]');

    if (
        !row ||
        e.target.closest('input, .handle')
    ) {
        return;
    }

    if (state.vocabMode === 'edit') {
        return;
    }

    toggleManageableRow('vocab', row.dataset.id);

    e.stopPropagation();
    renderVocabulary();
}

function handleOutsideClick(e) {
    const path =
        typeof e.composedPath === 'function'
            ? e.composedPath()
            : [];

    if (
        path.includes(lessonsTbody) ||
        path.includes(vocabTbody) ||
        path.includes(
            document.getElementById('sortMode')
        ) ||
        path.some(node =>
            node?.matches?.('[data-toggle-column]')
        ) ||
        path.includes(
            document.getElementById(
                'newLessonTitle'
            )
        ) ||
        path.includes(
            document.getElementById('newWord')
        ) ||
        path.includes(
            document.getElementById(
                'newTranslation'
            )
        )
    ) {
        return;
    }

    let needsRender = false;

    if (state.lessonMode === 'manageable') {
        setRowMode('lesson', 'view');
        needsRender = true;
    }

    if (state.vocabMode === 'manageable') {
        setRowMode('vocab', 'view');
        needsRender = true;
    }

    if (needsRender) {
        renderAll();
    }
}

function bindLessonDnD() {
    let dragged = null;

    lessonsTbody
        .querySelectorAll(
            'tr[data-id] .handle'
        )
        .forEach(handle => {
            handle.addEventListener(
                'dragstart',
                () => {
                    dragged =
                        handle.closest('tr');
                    dragged.classList.add(
                        'dragging'
                    );
                }
            );

            handle.addEventListener(
                'dragend',
                () => {
                    if (dragged) {
                        dragged.classList.remove(
                            'dragging'
                        );
                    }
                    dragged = null;
                }
            );
        });

    lessonsTbody
        .querySelectorAll(
            'tr[data-id]'
        )
        .forEach(row => {
            row.addEventListener(
                'dragover',
                e => {
                    e.preventDefault();
                }
            );

            row.addEventListener(
                'drop',
                e => {
                    e.preventDefault();

                    if (
                        !dragged ||
                        dragged === row
                    ) {
                        return;
                    }

                    const fromId =
                        dragged.dataset.id;
                    const toId =
                        row.dataset.id;

                    const fromIndex =
                        lessons.findIndex(
                            lesson =>
                                lesson.id === fromId
                        );
                    const toIndex =
                        lessons.findIndex(
                            lesson =>
                                lesson.id === toId
                        );

                    const [item] =
                        lessons.splice(
                            fromIndex,
                            1
                        );

                    lessons.splice(
                        toIndex,
                        0,
                        item
                    );

                    save();
                    renderLessons();
                }
            );
        });
}

function bindVocabularyDnD() {
    let dragged = null;

    vocabTbody
        .querySelectorAll(
            'tr[data-id] .handle'
        )
        .forEach(handle => {
            handle.addEventListener(
                'dragstart',
                () => {
                    dragged =
                        handle.closest('tr');
                    dragged.classList.add(
                        'dragging'
                    );
                }
            );

            handle.addEventListener(
                'dragend',
                () => {
                    if (dragged) {
                        dragged.classList.remove(

                        );
                    }
                    dragged = null;
                }
            );
        });

    vocabTbody
        .querySelectorAll(
            'tr[data-id]'
        )
        .forEach(row => {
            row.addEventListener(
                'dragover',
                e => {
                    e.preventDefault();
                }
            );

            row.addEventListener(
                'drop',
                e => {
                    e.preventDefault();

                    if (
                        !dragged ||
                        dragged === row
                    ) {
                        return;
                    }

                    const lesson =
                        getActiveLesson();

                    if (!lesson) {
                        return;
                    }

                    const fromId =
                        dragged.dataset.id;
                    const toId =
                        row.dataset.id;

                    const fromIndex =
                        lesson.words.findIndex(
                            word =>
                                word.id === fromId
                        );
                    const toIndex =
                        lesson.words.findIndex(
                            word =>
                                word.id === toId
                        );

                    const [item] =
                        lesson.words.splice(
                            fromIndex,
                            1
                        );

                    lesson.words.splice(
                        toIndex,
                        0,
                        item
                    );

                    save();
                    renderVocabulary();
                }
            );
        });
}

function escapeHtml(text) {
    return String(text)
        .replaceAll(
            '&',
            '&amp;'
        )
        .replaceAll(
            '<',
            '&lt;'
        )
        .replaceAll(
            '>',
            '&gt;'
        );
}

function escapeAttr(text) {
    return escapeHtml(text)
        .replaceAll(
            '"',
            '&quot;'
        )
        .replaceAll(
            "'",
            '&#39;'
        );
}
